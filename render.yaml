services:
  - type: web
    name: berg-api
    runtime: docker
    dockerfilePath: packages/api/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false
      - key: BETTER_AUTH_URL
        sync: false
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: APPLE_CLIENT_ID
        sync: false
      - key: APPLE_CLIENT_SECRET
        sync: false
      - key: SERVER_PEPPER
        generateValue: true
      - key: PHONE_ENCRYPTION_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: POSTHOG_API_KEY
        sync: false
      - key: ADMIN_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: API_BASE_URL
        sync: false
